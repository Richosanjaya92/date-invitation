<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special Date ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h1>💖 Special Date</h1>

<p class="sub">
Bikin undangan lucu buat pasangan.
</p>

<div class="form">

<label>Nama Pasangan</label>
<input id="nama" placeholder="Contoh : Endah">

<label>Nama Kamu</label>
<input id="dari" placeholder="Contoh : Richo">

<label>Nomor WhatsApp</label>
<input id="wa" placeholder="628xxxxxxxxxx">

<label>Judul Lagu</label>
<input id="lagu" placeholder="Perfect - Ed Sheeran">

<label>Link Foto</label>
<input id="foto" placeholder="https://.....jpg">

<br>

<button id="buat">
Buat Link ❤️
</button>

</div>

<div id="hasil" class="hide">

<h2>Link berhasil dibuat</h2>

<input id="link" readonly>

<br><br>

<button id="copy">
Copy Link
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
